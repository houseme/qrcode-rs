name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - "*"
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        rustc: [ nightly, stable ]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rustc }}
      - name: Run cargo check
        run: |
          cargo check --workspace --all-features
          cargo check --workspace --no-default-features
  rust_fmt_check:
    name: RustFmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
  clippy_check:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Run clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run cargo test
        run: cargo test --features "image,svg,eps,pic"
      - name: Run facade no-default tests
        run: cargo test --lib --no-default-features
      - name: Run core abstraction tests
        run: |
          cargo test --test core_abstraction --all-features
          cargo test --test core_abstraction --no-default-features
      - name: Run split crate tests
        run: |
          cargo test -p qrcode-core --no-default-features
          cargo test -p qrcode-core
          cargo test -p qrcode-render
          cargo test -p qrcode-render --features std
          cargo test -p qrcode-parse --no-default-features
          cargo test -p qrcode-decode --no-default-features
          cargo test -p qrcode-decode --features image,rqrr
          cargo test -p qrcode-svg
          cargo test -p qrcode-eps
          cargo test -p qrcode-pic
          cargo test -p qrcode-html
          cargo test -p qrcode-pdf
      - name: Run property and differential tests
        run: |
          cargo test --test proptest --all-features
          cargo test --test proptest --no-default-features
          cargo test --test differential --all-features
          cargo test --test differential --no-default-features
  compat_test:
    name: Run compat-1x tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-compat-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run compat tests
        run: |
          cargo test --test compat_1x --features compat-1x
          cargo test --test compat_1x --no-default-features --features compat-1x
          cargo test -p qrcode-compat
          cargo test -p qrcode-compat --no-default-features
  example_check:
    name: Check examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-examples-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Check all feature-gated examples
        run: cargo check --examples --all-features
      - name: Check focused v2 API examples
        run: |
          cargo check --example async_render --no-default-features --features async
          cargo check --example stream_codes --no-default-features --features std
          cargo check --example plugin_plain_text --no-default-features --features std
          cargo check --example plugin_invert_modules --no-default-features --features std
          cargo check --example cmyk_print --no-default-features --features eps,pdf
          cargo check --example color_spaces --no-default-features
          cargo check --example typed_encoding_mode --no-default-features
      - name: Check compat crate examples
        run: |
          cargo test -p qrcode-compat --doc --all-features
          cargo test -p qrcode-compat --doc --no-default-features
  package_check:
    name: Check package contents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-package-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Check packaged file lists
        run: cargo package --workspace --no-verify --list
  fuzz_smoke:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Check fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml --bins
      - name: Run short fuzz targets
        run: |
          cargo fuzz run encode -- -runs=16
          cargo fuzz run encode_with_version -- -runs=16
          cargo fuzz run render_svg -- -runs=16
          cargo fuzz run parse_payloads -- -runs=16
          cargo fuzz run structured_append -- -runs=16
  publish_on_crates_io:
    name: Publish on crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags') # Only on tags
    needs:
      - check
      - rust_fmt_check
      - clippy_check
      - test
      - compat_test
      - example_check
      - package_check
      - fuzz_smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish workspace crates
        run: |
          set -euo pipefail

          wait_for_crate() {
            crate="$1"
            version="$2"
            for attempt in $(seq 1 30); do
              if cargo info "${crate}@${version}" --registry crates-io >/dev/null 2>&1; then
                return 0
              fi
              echo "waiting for ${crate} ${version} to reach the crates.io index (${attempt}/30)"
              sleep 10
            done
            echo "${crate} ${version} did not appear in the crates.io index in time" >&2
            return 1
          }

          publish_crate() {
            crate="$1"
            version="$2"
            cargo publish --registry crates-io --package "${crate}" --allow-dirty
            wait_for_crate "${crate}" "${version}"
          }

          version="2.0.0"
          publish_crate qrcode-core "${version}"
          publish_crate qrcode-render "${version}"
          publish_crate qrcode-parse "${version}"
          publish_crate qrcode-decode "${version}"
          publish_crate qrcode-svg "${version}"
          publish_crate qrcode-eps "${version}"
          publish_crate qrcode-pic "${version}"
          publish_crate qrcode-html "${version}"
          publish_crate qrcode-pdf "${version}"
          publish_crate qrcode-rs "${version}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
